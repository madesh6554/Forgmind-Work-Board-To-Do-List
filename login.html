<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in &middot; Forgmind Work Board</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-mark">F</div>
        <div>
          <h1>Forgmind Work Board</h1>
          <p class="tagline">Sign in to continue</p>
        </div>
      </div>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Login</button>
        <button type="button" class="auth-tab" data-tab="register">Create Account</button>
      </div>

      <form id="loginForm" class="auth-form" autocomplete="off">
        <label>
          <span>Email</span>
          <input type="email" id="loginEmail" required maxlength="120" />
        </label>
        <label>
          <span>Password</span>
          <input type="password" id="loginPass" required maxlength="64" />
        </label>
        <div class="auth-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary auth-submit">Sign In</button>
      </form>

      <form id="registerForm" class="auth-form hidden" autocomplete="off">
        <label>
          <span>Email</span>
          <input type="email" id="regEmail" required maxlength="120" />
        </label>
        <label>
          <span>Password</span>
          <input type="password" id="regPass" required minlength="6" maxlength="64" />
        </label>
        <label>
          <span>Confirm Password</span>
          <input type="password" id="regPass2" required minlength="6" maxlength="64" />
        </label>
        <div class="auth-error" id="regError"></div>
        <button type="submit" class="btn btn-primary auth-submit">Create Account</button>
      </form>

      <p class="auth-hint">Your account works on any device.</p>
    </div>
  </div>

  <script>
    (async function () {
      if (await Auth.isLoggedIn()) {
        window.location.replace("index.html");
        return;
      }

      const tabs = document.querySelectorAll(".auth-tab");
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const loginError = document.getElementById("loginError");
      const regError = document.getElementById("regError");

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          const which = tab.dataset.tab;
          loginForm.classList.toggle("hidden", which !== "login");
          registerForm.classList.toggle("hidden", which !== "register");
          loginError.textContent = "";
          regError.textContent = "";
        });
      });

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        loginError.textContent = "";
        const btn = loginForm.querySelector("button[type=submit]");
        btn.disabled = true;
        btn.textContent = "Signing in...";
        const email = document.getElementById("loginEmail").value.trim();
        const pass = document.getElementById("loginPass").value;
        const res = await Auth.login(email, pass);
        if (res.ok) {
          window.location.replace("index.html");
        } else {
          loginError.textContent = res.error || "Invalid email or password.";
          btn.disabled = false;
          btn.textContent = "Sign In";
        }
      });

      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        regError.textContent = "";
        const email = document.getElementById("regEmail").value.trim();
        const pass = document.getElementById("regPass").value;
        const pass2 = document.getElementById("regPass2").value;
        if (pass !== pass2) {
          regError.textContent = "Passwords do not match.";
          return;
        }
        const btn = registerForm.querySelector("button[type=submit]");
        btn.disabled = true;
        btn.textContent = "Creating...";
        const res = await Auth.register(email, pass);
        if (res.ok && !res.needsConfirm) {
          window.location.replace("index.html");
        } else if (res.ok && res.needsConfirm) {
          regError.style.color = "#6be675";
          regError.textContent = "Check your email to confirm, then log in.";
          btn.disabled = false;
          btn.textContent = "Create Account";
        } else {
          regError.textContent = res.error || "Could not create account.";
          btn.disabled = false;
          btn.textContent = "Create Account";
        }
      });
    })();
  </script>
</body>
</html>
